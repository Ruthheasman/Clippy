<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      background: #0a0a0f;
      color: #e4e4ef;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #00d4ff, #0066ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 11px;
      color: #6b6b80;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn:hover { background: rgba(0, 212, 255, 0.2); }
    .hint {
      margin-top: 10px;
      font-size: 10px;
      color: #6b6b80;
      text-align: center;
    }
    kbd {
      background: rgba(255,255,255,0.05);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">📎</div>
    <div>
      <div class="title">Clippy</div>
      <div class="subtitle">AI Screen Companion</div>
    </div>
  </div>

  <button class="btn" id="open-panel">Open Side Panel</button>

  <div class="hint">
    Or press <kbd>Ctrl+Shift+Y</kbd> anytime
  </div>

  <script>
    document.getElementById('open-panel').addEventListener('click', async () => {
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      const win = await chrome.windows.getCurrent();
      chrome.runtime.sendMessage({
        type: 'open-sidepanel',
        windowId: win.id,
      });
      window.close();
    });
  </script>
</body>
</html>
